publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Fonts
  google_fonts: ^6.2.1

  # UI utilities
  cached_network_image: ^3.3.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
