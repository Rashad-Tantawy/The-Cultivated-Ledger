name: cultivated_ledger
description: The Cultivated Ledger - Agricultural Private Equity Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.0

  # Payments
  flutter_stripe: ^10.2.0

  # Fonts & UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  lottie: ^3.1.0

  # Push notifications
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # File handling
  image_picker: ^1.1.1
  file_picker: ^8.0.3
  path_provider: ^2.1.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  internet_connection_checker_plus: ^2.4.0
  equatable: ^2.0.5

  # Local storage / offline cache
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
